name: package-private-project

on:
  workflow_dispatch:
    inputs:
      private_ref:
        description: Git ref in private repository
        required: false
        default: main
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      PRIVATE_REPO: your-org/private-repo-demo
      PRIVATE_REF: ${{ inputs.private_ref || 'main' }}
    steps:
      - name: Checkout public repository
        uses: actions/checkout@v5

      - name: Checkout private repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ env.PRIVATE_REF }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-src
          fetch-depth: 1

      - name: Show checked out commit
        working-directory: private-src
        run: |
          echo "private repo: $PRIVATE_REPO"
          git rev-parse HEAD

      - name: Package project
        working-directory: private-src
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-package-${{ github.run_number }}
          path: private-src/dist
          if-no-files-found: error
